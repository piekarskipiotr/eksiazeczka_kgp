name: eksiazeczka_kgp
description: Digital version of Korona Gór Polskich booklet
version: 0.0.1+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  bloc: ^8.1.4
  brick_offline_first: ^3.4.0
  brick_offline_first_with_supabase: ^1.3.0
  brick_offline_first_with_supabase_build: ^1.1.0
  brick_sqlite: ^3.2.1
  brick_supabase: ^1.4.0
  build_runner: ^2.4.14
  cached_network_image: ^3.4.1
  crypto: ^3.0.6
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^4.2.1
  flutter_svg: ^2.0.16
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  google_nav_bar: ^5.0.7
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  sentry_flutter: ^8.12.0
  shared_preferences: ^2.3.5
  shimmer: ^3.0.0
  sign_in_with_apple: ^6.1.4
  sqflite: ^2.4.1
  sqflite_common: ^2.5.4+6
  supabase_flutter: ^2.8.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  bloc_test: ^9.1.7
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/avatars/
    - assets/images/icons/
    - assets/images/logos/
    - assets/images/peaks/
    - assets/images/providers/
    - assets/json/

spider:
  generate_tests: true
  no_comments: true
  export: true
  use_part_of: true
  use_references_list: false
  package: resources
  groups:
    - path: assets/images/avatars
      class_name: AvatarImages
      types: [ .png ]
    - path: assets/images/icons
      class_name: IconImages
      types: [ .svg ]
    - path: assets/images/logos
      class_name: LogoImages
      types: [ .png ]
    - path: assets/images/peaks
      class_name: PeakImages
      types: [ .jpg ]
    - path: assets/images/providers
      class_name: ProvidersIcons
      types: [ .svg ]