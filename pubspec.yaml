name: eksiazeczka_kgp
description: Digital version of Korona Gór Polskich booklet
version: 0.0.1+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  bloc: ^8.1.4
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.16
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  google_nav_bar: ^5.0.7
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  bloc_test: ^9.1.7
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/avatars/
    - assets/images/icons/
    - assets/images/logos/
    - assets/images/peaks/
    - assets/images/providers/
    - assets/json/

spider:
  generate_tests: true
  no_comments: true
  export: true
  use_part_of: true
  use_references_list: false
  package: resources
  groups:
    - path: assets/images/avatars
      class_name: AvatarImages
      types: [ .png ]
    - path: assets/images/icons
      class_name: IconsImages
      types: [ .svg ]
    - path: assets/images/logos
      class_name: LogoImages
      types: [ .png ]
    - path: assets/images/peaks
      class_name: PeakImages
      types: [ .jpg, .jpeg ]
    - path: assets/images/providers
      class_name: ProvidersIcons
      types: [ .svg ]