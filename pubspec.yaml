name: eksiazeczka_kp
description: Digital version of booklet to conquer popular polish peaks
version: 1.0.0+11
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  bloc: ^8.1.4
  build_runner: ^2.4.14
  cached_network_image: ^3.4.1
  crypto: ^3.0.6
  equatable: ^2.0.7
  exif: ^3.3.0
  flutter:
    sdk: flutter
  flutter_3d_controller: ^2.1.0
  flutter_animate: ^4.5.2
  flutter_bloc: ^8.1.6
  flutter_image_compress: ^2.4.0
  flutter_localizations:
    sdk: flutter
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.16
  geolocator: ^13.0.2
  go_router: ^14.6.3
  google_fonts: ^6.2.1
  google_nav_bar: ^5.0.7
  google_sign_in: ^6.2.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  lukehog: ^0.4.5
  modal_bottom_sheet: ^3.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  sentry_flutter: ^8.12.0
  shared_preferences: ^2.3.5
  shimmer: ^3.0.0
  sign_in_with_apple: ^6.1.4
  sqflite: ^2.4.1
  supabase_flutter: ^2.8.3
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  bloc_test: ^9.1.7
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/googleFonts/
    - assets/images/icons/
    - assets/images/logos/
    - assets/images/medalBackgrounds/
    - assets/images/medals/
    - assets/images/peaks/
    - assets/images/providers/
    - assets/json/
    - assets/models/medals/


spider:
  generate_tests: true
  no_comments: true
  export: true
  use_part_of: true
  use_references_list: false
  package: resources
  groups:
    - path: assets/images/icons
      class_name: IconImages
      types: [ .svg ]
    - path: assets/images/logos
      class_name: LogoImages
      types: [ .png ]
    - path: assets/images/medalBackgrounds
      class_name: MedalBackgrounds
      types: [ .jpg ]
    - path: assets/images/medals
      class_name: MedalImages
      types: [ .png ]
    - path: assets/images/peaks
      class_name: PeakImages
      types: [ .jpg ]
    - path: assets/images/providers
      class_name: ProvidersIcons
      types: [ .svg ]
    - path: assets/json
      class_name: Jsons
      types: [ .json ]
    - path: assets/models/medals
      class_name: MedalModels
      types: [ .glb ]